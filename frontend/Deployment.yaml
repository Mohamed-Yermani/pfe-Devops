apiVersion: apps/v1
kind: Deployment
metadata:
  name: cnss-front
  namespace: cnss
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cnss-front
  template:
    metadata:
      labels:
        app: cnss-front
    spec:
      containers:
        - name: cnss-front
          image: yermanimohamed/cnss_frontend:1.0.0
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: 200m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: BACKEND_URL
              value: "http://192.168.33.12:30001"
